<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  margin: 0;
}

.container {
  background: white;
  padding: 25px;
  width: 420px;
  border-radius: 15px;
  margin-top: 40px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 { margin-bottom: 5px; }

.tagline { font-size: 13px; color: gray; }

#count { font-size: 12px; color: #aaa; margin-bottom: 10px; }

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

button:hover { transform: scale(1.05); }

.clear-btn { background: #ff4d4d; }

ul { list-style: none; padding: 0; }

li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #f3f4ff;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
}

footer {
  margin-top: 20px;
  color: #ddd;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">
  <h1>TaskFlow</h1>
  <p class="tagline">Smart task management with priority scheduling</p>
  <p id="count"></p>

  <input type="text" id="searchInput" placeholder="Search tasks..." onkeyup="render()">

  <br>

  <input type="text" id="taskInput" placeholder="Enter task">
  <select id="priority">
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>

  <input type="date" id="dueDate">

  <br>

  <button onclick="addTask()">Add</button>
  <button onclick="smartSchedule()">Smart Schedule</button>
  <button class="clear-btn" onclick="clearAll()">Clear</button>

  <div style="margin-top:10px;">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('active')">Active</button>
    <button onclick="setFilter('completed')">Completed</button>
  </div>

  <ul id="taskList"></ul>
</div>

<footer>
  &copy; 2026 Manya Sohan D.H
</footer>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter = "all";

function addTask() {
  let text = document.getElementById("taskInput").value;
  let priority = document.getElementById("priority").value;
  let due = document.getElementById("dueDate").value;

  if(text.trim() === "") return;

  tasks.push({text, priority, completed:false, due});
  document.getElementById("taskInput").value = "";
  render();
}

function render() {
  let list = document.getElementById("taskList");
  let search = document.getElementById("searchInput").value.toLowerCase();

  list.innerHTML = "";

  tasks
    .filter(t => t.text.toLowerCase().includes(search))
    .filter(t => {
      if(filter === "active") return !t.completed;
      if(filter === "completed") return t.completed;
      return true;
    })
    .forEach((t, i) => {
      let li = document.createElement("li");

      li.innerHTML = `
        <input type="checkbox" ${t.completed ? "checked" : ""} onclick="toggleComplete(${i})">
        <span style="${t.completed ? 'text-decoration:line-through;' : ''}">
          ${t.text}
        </span>
        <small>${t.due ? "📅 "+t.due : ""} (${t.priority})</small>
        <button onclick="deleteTask(${i})">X</button>
      `;

      list.appendChild(li);
    });

  document.getElementById("count").innerText = `Tasks: ${tasks.length}`;

  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function deleteTask(i){
  tasks.splice(i,1);
  render();
}

function toggleComplete(i){
  tasks[i].completed = !tasks[i].completed;
  render();
}

function clearAll(){
  tasks = [];
  render();
}

function setFilter(type){
  filter = type;
  render();
}

function smartSchedule(){
  let high = tasks.filter(t => t.priority === 'high');
  let medium = tasks.filter(t => t.priority === 'medium');
  let low = tasks.filter(t => t.priority === 'low');

  let result = [];
  let max = Math.max(high.length, medium.length, low.length);

  for(let i=0;i<max;i++){
    if(high[i]) result.push(high[i]);
    if(medium[i]) result.push(medium[i]);
    if(low[i]) result.push(low[i]);
  }

  tasks = result;
  render();

  alert("Smart Scheduling Applied!");
}

render();
</script>

</body>
</html>
